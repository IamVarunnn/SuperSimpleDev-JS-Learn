<script>

    let words = ['apple','apple','grape','apple'];

    function countWord(words){

        let obj = {};

        for(let i = 0; i < words.length; i++){

           let word = words[i];

            if(!obj[word]){
                obj[word] = 1;
            }
            else{
                obj[word]++;
            }
             
        }
        
        return obj;
    }

    console.log(countWord(words));
    
</script>
