<script>

    let arr = ['hello','world','search', 'hello','good','search'];

    
    function searchInd(arr, k){

        for(let i = 0; i < arr.length; i++){
            if(arr[i] === k){
                return true;
               
            }
        }

        return false;
    }

    function uniqueArr(arr){

        let ans =  [];

        for(let i = 0; i < arr.length; i++){

            if(!searchInd(ans, arr[i])){
                ans.push(arr[i]);
            }
           
        }

        return ans;
    }



    // console.log(searchInd(arr, 'hello'));
    // searchInd(arr, 'search');
    console.log(uniqueArr(arr));
