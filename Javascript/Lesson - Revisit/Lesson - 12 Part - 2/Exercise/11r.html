<script>

    let arr = ['egg','apple','egg', 'egg','ham'];

    
    
    function removeEgg(arr){
        let ans = [];

        for(let i = 0; i < arr.length; i++){

            if(arr[i] === 'egg'){
                continue;
            }
            else{
                ans.push(arr[i]);
            }
        }

        return ans;
    }

    console.log(removeEgg(arr));
