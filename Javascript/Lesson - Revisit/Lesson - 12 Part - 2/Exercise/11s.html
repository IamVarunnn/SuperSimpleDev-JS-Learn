<script>

    let arr = ['egg','apple','egg', 'egg','ham'];

    
    
    function removeEgg(arr){
        let ans = [];

       let count = 0;

        for(let i = 0; i < arr.length; i++){
            
            if(arr[i] === 'egg'){
                count++;
            }
            
            if(arr[i] !== 'egg'){
                ans.push(arr[i]);
            }
            else if(arr[i] === 'egg' && count > 2){
                ans.push('egg');
            }
        }

        return ans;
    }

    console.log(removeEgg(arr));



    

</script>
