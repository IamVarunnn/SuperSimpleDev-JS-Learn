<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <p>Calculator</p>
    <p>
        <button onclick="
            calulation += '1';
            console.log(calulation);   
        " >1</button>

        <button onclick="
            calulation += '2';
            console.log(calulation);   
        ">2</button>

        <button onclick="
            calulation += '3';
            console.log(calulation);   
        ">3</button>

        <button onclick="
            calulation += ' + ';
            console.log(calulation);   
        ">+</button>
    </p>

    <p>
        <button onclick="
            calulation += '4';
            console.log(calulation);   
        " >4</button>

        <button onclick="
            calulation += '5';
            console.log(calulation);   
        ">5</button>

        <button onclick="
            calulation += '6';
            console.log(calulation);   
        ">6</button>

        <button onclick="
            calulation += ' - ';
            console.log(calulation);   
        ">-</button>
    </p>

    <p>
        <button onclick="
            calulation += '7';
            console.log(calulation);   
        " >7</button>

        <button onclick="
            calulation += '8';
            console.log(calulation);   
        ">8</button>

        <button onclick="
            calulation += '9';
            console.log(calulation);   
        ">9</button>

        <button onclick="
            calulation += ' * ';
            console.log(calulation);   
        ">*</button>
    </p>

    <p>
        <button onclick="
            calulation += '0';
            console.log(calulation);   
        " >0</button>

        <button onclick="
            calulation += '.';
            console.log(calulation);   
        ">.</button>

        <button onclick="
            // calulation += '=';
            console.log(eval(calulation));   
        ">=</button>

        <button onclick="
            calulation += ' / ';
            console.log(calulation);   
        ">/</button>
    </p>

    <p>
        <button onclick="
            calulation = '';
            console.log(calulation);
        " >Clear</button>
    </p>

    <!-- <button onclick="
        // calulation += '+';
        console.log(eval(calulation));   
        ">=</button>
    -->
</body>
<script>

    let calulation = '';

</script>
</html>
