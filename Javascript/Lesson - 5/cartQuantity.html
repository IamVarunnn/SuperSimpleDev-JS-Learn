<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    
    <h1></h1>
    <button onclick="increasequantfour();  " >+4</button>
    <button onclick="increasequantfive(); " >+5</button>
    <button onclick="removeQunatity(); " >remove item</button>
    <button onclick="removeQunatitytwo(); " >-2</button>
    <button onclick="removeQunatitythree(); " >-3</button>

</body>
<script>

    

    let h1 = document.querySelector('h1');
    let quantity = 0;
    
    function increasequantfour(){
        quantity += 4;
        h1.innerText = quantity;
    }

    function increasequantfive(){
        quantity += 5;
        h1.innerText = quantity;
    }

    console.log(quantity);

    function removeQunatity(){
        if(quantity > 0){
            quantity -= 1;
        }
        h1.innerText = quantity;
    }

    function removeQunatitythree(){
        if(quantity > 3){
            quantity -= 3;
        }
        h1.innerText = quantity;
    }

    function removeQunatitytwo(){
        if(quantity > 2){
            quantity -= 2;
        }

        h1.innerText = quantity;
    }

    



</script>
