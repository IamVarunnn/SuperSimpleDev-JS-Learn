<script>

    let arr = ['egg','apple','egg', 'egg','ham'];

    
    
    
    
    function removeEgg(arr){
        let ansarr = arr.reverse();
        let ans = [];

        let count = 0;

        for(let i = 0; i < ansarr.length; i++){
            
             
             
            if(ansarr[i] === 'egg' && count < 2){
                count++;
                continue;
            }

            ans.push(ansarr[i]);
        }

        return ans.reverse();
    }

    console.log(removeEgg(arr) );
