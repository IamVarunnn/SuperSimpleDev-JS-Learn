<script>

    let arr = [1, 1, 2, -1, 0];
    
    
    function minMax(arr){
        let n = arr.length;
        let obj = {
            min : null,
            max : null
        };

        if(n == 1){
            obj = {
                min : arr[0],
                max : arr[0]
            }

            return obj;
        }

        for(let i = 0; i < n; i++){

            obj.min = Math.min(arr[i],obj.min);
            obj.max = Math.max(arr[i],obj.max);
        }

        return obj;
    }

    console.log(minMax(arr));
    console.log(minMax([1]));
    console.log(minMax([]));
    
</script>
