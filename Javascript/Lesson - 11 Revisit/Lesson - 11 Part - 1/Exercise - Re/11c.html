<script>

    let ans = [1, 2, 3, 5];

    function arraySwap(arr){
        let n = arr.length;

        let temp = arr[0];
         
        arr[0] = arr[n - 1];
        
        arr[n - 1] = temp;
        
        return arr;
    }

    let res = arraySwap(ans);

    console.log(res);

</script>
