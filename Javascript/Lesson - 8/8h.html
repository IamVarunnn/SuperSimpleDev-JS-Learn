<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    
    <p>
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button> + </button>
    </p>
    
    <p>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button> - </button>
    </p>

    <p>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button> * </button>
    </p>

    <p>
        <button>0</button>
        <button>.</button>
        <button>=</button>
        <button> / </button>
    </p>

</body>

<script>

    let calculation = '';

    let btn = document.querySelectorAll('button');

    btn.forEach((ele)=>{
        ele.addEventListener('click',(e)=>{
            let key = e.target.innerText;


            if(key == '+'){
                updateCal(key);
            }
            else if(key == '='){
                console.log(eval(calculation));
               
            }
            else{
                updateCal(key);
                
            }
        });
    })

    function updateCal(value){
        calculation += value;
        console.log(calculation);
    }

</script>

</html>
