<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12d</title>
    <style>

        body{
            background-color: black;
        }

    </style>
</head>
<body>
    <button onclick="timeoutFun();" >Start</button>
</body>
<script>

    
    function timeoutFun(){
        let btn = document.querySelector('button');

        setTimeout(()=>{
            btn.innerText = 'Loading...';
        },1000);

        setTimeout(()=>{
            btn.innerText = 'Finished!';
        },2000);
    }

</script>
</html>
