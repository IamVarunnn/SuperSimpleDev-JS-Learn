<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>12d</title>
    <style>

        body{
            background-color: black;
        }

    </style>
</head>
<body>
    <button onclick="timeoutFun();" >Add to Cart</button>
    <p class="text" ></p>
</body>
<script>

    let inteverValId;
    let flag = false;
    function timeoutFun(){
        let btn = document.querySelector('button');
        let text = document.querySelector('.text');

        
        text.innerText = 'Added';
        
        clearTimeout(inteverValId);

        inteverValId = setTimeout(()=>{
            text.innerText = '';
        },2000);

    }

</script>
</html>
