<script>

    let arr = [1, 20.22, 22, 24, 5];
    let str = ['hi','hello','good'];

    function arraySwap(arr){
        let n = arr.length;

        let temp = arr[0];
        arr[0] = arr[n - 1];
        arr[n - 1] = temp;

        return arr;
    }

    console.log(arraySwap(arr));
    console.log(arraySwap(str));

</script>
