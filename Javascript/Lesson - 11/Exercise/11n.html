<script>


    let str = ['apple','grape','apple','apple'];


    function countWords(arr){
        let n = arr.length;

        let res = {};
        for(let i = 0; i < n; i++){
            
            if(res[arr[i]]){
                res[arr[i]]++;
            }
            else{
                res[arr[i]] = 1;
            }
        }

        return res;
    }

    console.log(countWords(str));

</script>
