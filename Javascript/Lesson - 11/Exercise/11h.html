<script>

    function addOne(arr){
        let n = arr.length;

        for(let i = 0; i < n; i++){
            arr[i] = arr[i] + 1;
        }

        return arr;
    }

    let arr = [1, 2, 3];
    let brr = [-2, -1, 0, 99];


    console.log(addOne(arr));
    console.log(addOne(brr));

</script>
