<script>

    function minMax(arr){
        let n = arr.length;


      
        let obj = {
            mini : null,
            maxi : null,
        };

        
         
        for(let i = 0; i < n; i++){

          
            obj.mini = Math.min(obj.mini, arr[i]);
            obj.maxi = Math.max(obj.maxi, arr[i]);
        }

        return obj;

    }

    let arr = [1, -3, 5];

    console.log(minMax(arr));
    console.log(minMax([]));
    console.log(minMax([3]));

</script>
