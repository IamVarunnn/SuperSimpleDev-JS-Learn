<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        .todo-grid, .todo-grid-dis{
            display: grid;
            grid-template-columns: 200px 150px 100px;
            column-gap: 10px;
            row-gap: 10px;
        }

        .todo-grid-dis{
            margin-bottom: 10px;
        }

        .todoInput{
            padding: 10px;
            border-radius: 3px;
        }

        .dueDate{
            padding: 10px;
            border-radius: 3px;
        }

        .addBtn{
            padding: 10px 30px;
            border-radius: 3px;
            color: white;
            background-color: green;
            border: none;
            
        }

        .DelBtn{
            padding: 10px 30px;
            border-radius: 3px;
            color: white;
            background-color: red;
            border: none;
        }



    </style>
</head>
<body>
    
    <p>Todo List Practice 1</p>
    <div class="todo-grid-dis" >

        <input class="todoInput" type="text" placeholder="Todo name">
    
        <input class="dueDate" type="date">
        <button class="addBtn" >Add</button>

    </div>
    <div class="display todo-grid"></div>

</body>
<script>

    
    let todoObjT = localStorage.getItem('todoList');

    let todoObjP = JSON.parse(todoObjT);

    let todoList = todoObjP || [
        {
            name : 'make dinner',
            date : '12-1-2025',
        },

        {
            name : 'Do study',
            date : '12-12-2222',
        }
    ];
     

    renderTodoList();
 

    function renderTodoList(){
        let todoListHTML = '';

        for(let i = 0; i < todoList.length; i++){
            // let todo = todoList[i];
            let todoObj = todoList[i];

            let name = todoObj.name;
            let date = todoObj.date;

            

            let html = `
                <div>${name}</div>
                <div>${date}</div>
                <button class = 'DelBtn' onclick = "delTodo(${i}, 1);" >Delete</button>

            `;

            todoListHTML += html;
        }

  

        console.log(todoListHTML);

        let display = document.querySelector('.display');

        display.innerHTML = todoListHTML;
    }

    


    let btn = document.querySelector('button');

    btn.addEventListener('click',Todo);

    function Todo(){
        let inputText = document.querySelector('input');
        let display = document.querySelector('.display');
        let date = document.querySelector('.dueDate');
        let dueDateI = date.value;

        if(inputText.value === '' || dueDateI === ''){
            return;
        }

        todoList.push({
           name : inputText.value,
           date : dueDateI
        });

     

      

        console.log(todoList);
        inputText.value = '';

          
        addLocal();
        renderTodoList();
    }

    function addLocal(){
        let todoListStr = JSON.stringify(todoList);
        localStorage.setItem('todoList',todoListStr);
    }

    function delTodo(i, val){
        todoList.splice(i, val);
        addLocal();
        renderTodoList();
    }


</script>
</html>
