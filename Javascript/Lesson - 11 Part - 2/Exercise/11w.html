<script>


    let arr = ['search','hello', 'world', 'search','good','search'];

    let n = arr.length;

    function searchEle(arr, k){
        let ans = -1;
        for(let i = 0; i < n; i++){

            if(arr[i] === k){
                ans =  i;
                break;
            }
        }

        return ans;
    }

    function uniqueArr(arr){
        let ans = [];
        let n = arr.length;
        
        for(let i = 0; i < n; i++){
            if(searchEle(ans, arr[i]) === -1){
                ans.push(arr[i]);
            }
        }

        return ans;
    }

    console.log(uniqueArr(arr))

</script>
