<script>


    let arr = ['search','hello', 'world', 'search','good','search'];

    let n = arr.length;

    function searchEle(arr, k){
        let ans = -1;
        for(let i = 0; i < n; i++){

            if(arr[i] === k){
                ans =  i;
                break;
            }
        }

        return ans;
    }

    console.log(searchEle(arr, 'search'));
    console.log(searchEle(arr, 'searc'));
