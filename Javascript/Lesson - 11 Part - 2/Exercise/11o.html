<script>

    let arr = ['hello', 'world', 'search','good'];

    let n = arr.length;

    function searchEle(arr, k){
        for(let i = 0; i < n; i++){

            if(arr[i] === k){
                return i;
            }
        }

        return -1;
    }

    console.log(searchEle(arr, 'search'));
    console.log(searchEle(arr, 'searc'));
</script>
