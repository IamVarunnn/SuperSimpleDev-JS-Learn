<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add to cart</title>
    <style>

   

        .gaming{
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            font-weight: 600;
            color: black;
            background-color: rgb(230,230,230);
        }

        .not-gaming{
             color: rgb(230,230,230);
            background-color: black;
        }

    </style>
</head>
<body>
    
   
    <button class="gaming" onclick="onoff();" >Gaming</button>

</body>
<script>

    function onoff(){
        let btn = document.querySelector('button');

        if(!btn.classList.contains('not-gaming')){
            btn.classList.add('not-gaming');
        }
        else{
            btn.classList.remove('not-gaming');
        }

    }

</script>
</html>
