<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add to cart</title>
    <style>

   

        .gaming,.music,.tech{
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            font-weight: 600;
            color: black;
            background-color: rgb(230,230,230);
        }

        .not-gaming,.not-music,.not-tech{
             color: rgb(230,230,230);
            background-color: black;
        }

    </style>
</head>
<body>
    
   
    <button class="gaming" onclick="onoffGaming();" >Gaming</button>
    <button class="music" onclick="onoffMusic()" >Music</button>
    <button class="tech" onclick="onoffTech()" >Tech</button>

</body>
<script>

    function onoffGaming(){
        let btn = document.querySelector('.gaming');

        if(!btn.classList.contains('not-gaming')){
            btn.classList.add('not-gaming');
        }
        else{
            btn.classList.remove('not-gaming');
        }

    }

    function onoffMusic(){
        let btn = document.querySelector('.music');

        if(!btn.classList.contains('not-music')){
            btn.classList.add('not-music');
        }
        else{
            btn.classList.remove('not-music');
        }

    }

    function onoffTech(){
        let btn = document.querySelector('.tech');

        if(!btn.classList.contains('not-tech')){
            btn.classList.add('not-tech');
        }
        else{
            btn.classList.remove('not-tech');
        }

    }

</script>
</html>
