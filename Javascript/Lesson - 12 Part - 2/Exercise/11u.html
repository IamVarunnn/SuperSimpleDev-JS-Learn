<script>

    function removeEgg(foods){

        let foodsCopy = foods.splice();
        let reverseFoods = foods.reverse();


        let res = [];
        let count = 0;

        for(let i = 0; i < reverseFoods.length; i++){

            if(reverseFoods[i] === 'egg' && count < 2){
                count++;
                continue;
            }

            res.push(reverseFoods[i]);
        }

        return res.reverse();
    }
