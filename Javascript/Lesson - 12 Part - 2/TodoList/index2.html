<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>
<body>
    
    <p>Todo List Practice 1</p>
    <input type="text" placeholder="Todo name">
   
    <input class="dueDate" type="date">
     <button>Add</button>
    <div class="display"></div>

</body>
<script>

    
    

    let todoList = [
        {
            name : 'make dinner',
            date : '12-1-2025',
        },

        {
            name : 'Do study',
            date : '12-12-2222',
        }
    ];

    renderTodoList();
 

    function renderTodoList(){
        let todoListHTML = '';

        for(let i = 0; i < todoList.length; i++){
            // let todo = todoList[i];
            let todoObj = todoList[i];

            let name = todoObj.name;
            let date = todoObj.date;

            let html = `

                <p>${name} ${date} <button onclick = "delTodo(${i}, 1);" >Delete</button> </p>

            `;

            todoListHTML += html;
        }

  

        console.log(todoListHTML);

        let display = document.querySelector('.display');

        display.innerHTML = todoListHTML;
    }

    


    let btn = document.querySelector('button');

    btn.addEventListener('click',Todo);

    function Todo(){
        let inputText = document.querySelector('input');
        let display = document.querySelector('.display');
        let date = document.querySelector('.dueDate');
        let dueDateI = date.value;
        todoList.push({
           name : inputText.value,
           date : dueDateI
        });
        console.log(todoList);
        inputText.value = '';

        renderTodoList();
    }

    function delTodo(i, val){
        todoList.splice(i, val);
        renderTodoList();
    }


</script>
</html>
