<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    
    <p>Rock Paper Scissors</p>
    <!-- Rock - 1 -->
    <!-- Paper - 2 -->
    <!-- Scissors - 3 -->

    <button onclick="
        // let randNo = Math.floor(Math.random() * 3) + 1;
        // let computerMove = getComputerMove();

        // let res = getResult(computerMove, 'rock');
 
        // alert(`You picked ${'rock'}. Computer picked ${computerMove}. ${res}`);
        
        playGame('rock');">Rock</button>

    <button onclick="playGame('paper');">Paper</button>

    <button onclick="playGame('scissors');">Scissors</button>

</body>
<script>

    function getComputerMove(){
        let randNo = Math.random();
        console.log(randNo);
        let computerMove = '';
        if(randNo >= 0 && randNo < 1 / 3){
            computerMove = 'rock';
            
        }
        else if(randNo >= 1 / 3 && randNo < 2 / 3){
            computerMove = 'paper';
        }
        else if(randNo >= 2 / 3&& randNo < 1){
            computerMove = 'scissors';
            
        }

        return computerMove;
    }
    function getResult(computerMove, userMove){
        let res = '';

        if (computerMove === userMove) {
            res = 'Tie';
        }
        else if (userMove === 'rock') {
            res = (computerMove === 'scissors') ? 'You Won' : 'You Lost';
        }
        else if (userMove === 'paper') {
            res = (computerMove === 'rock') ? 'You Won' : 'You Lost';
        }
        else if (userMove === 'scissors') {
            res = (computerMove === 'paper') ? 'You Won' : 'You Lost';
        }

        return res;
    }
    
    function playGame(userMove){

        let computerMove = getComputerMove();
        
        let res = getResult(computerMove, userMove);

        alert(`You picked ${userMove}. Computer picked ${computerMove}. ${res}`);
    }

</script>
</html>
