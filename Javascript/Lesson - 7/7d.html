<script>

    function convertToFarenheit(celsius){
        let fareh = celsius * (9 / 5) + 32;
        return fareh;
    }

    function convertToCelsius(fareh){
        let celsius = (fareh - 32) * 5 / 9;
        return celsius;
    }

    console.log(convertToFarenheit(25));
    console.log(convertToCelsius(86));
    

</script>
