<script>

    function convertTemp(degree, unit){

        if(unit == 'C'){
            return convertToFarenheit(degree);
        }
        else if(unit == 'F'){
            return convertToCelsius(degree);
        }

    }

    function convertToFarenheit(celsius){
        let fareh = celsius * (9 / 5) + 32;
        return fareh;
    }

    function convertToCelsius(fareh){
        let celsius = (fareh - 32) * 5 / 9;
        return celsius;
    }

    console.log(convertTemp(25, 'C'));
    console.log(convertTemp(77, 'F'));

</script>
