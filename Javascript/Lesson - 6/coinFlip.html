<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Flip Game</title>
</head>
<body>
    
</body>
<script>

    let randNo = Math.random().toFixed(1);

    // console.log(randNo);
    let res = '';

    if(randNo < 0.5){
        res = 'Heads';
    }
    else{
        res = 'Tails';
    }

    let urGuess = prompt('Enter your Guess');

    urGuess == res ? console.log('You Win') : console.log('Lost');
     

</script>
</html>
