<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    
    <p>Rock Paper Scissors</p>
    <!-- Rock - 1 -->
    <!-- Paper - 2 -->
    <!-- Scissors - 3 -->

    <button onclick="
        // let randNo = Math.floor(Math.random() * 3) + 1;
        // let computerMove = getComputerMove();

        // let res = getResult(computerMove, 'rock');
 
        // alert(`You picked ${'rock'}. Computer picked ${computerMove}. ${res}`);
        
        playGame('rock');">Rock</button>

    <button onclick="playGame('paper');">Paper</button>

    <button onclick="playGame('scissors');">Scissors</button>
    <p class="winner" ></p>
    <p class="choices" ></p>
    <p class="finalscore" ></p>

    <button onclick="resetScore()" >Reset Score</button>

</body>
<script>

    let scoreString = localStorage.getItem('score');

    let scoreObj = JSON.parse(scoreString);

    let resText = document.querySelector('.winner');
    let choicesText = document.querySelector('.choices')
    let scoreRes = document.querySelector('.finalscore');

    let score = scoreObj || {
        win : 0,
        lost : 0,
        draw : 0
    };

    
    scoreRes.innerHTML = `Wins : ${0} Lost : ${0} Tie : ${0}`
    
    
    
    
    function getComputerMove(){
        let randNo = Math.random();
        console.log(randNo);
        let computerMove = '';
        if(randNo >= 0 && randNo < 1 / 3){
            computerMove = 'rock';
            
        }
        else if(randNo >= 1 / 3 && randNo < 2 / 3){
            computerMove = 'paper';
        }
        else if(randNo >= 2 / 3&& randNo < 1){
            computerMove = 'scissors';
            
        }

        return computerMove;
    }
    
    function getResult(computerMove, userMove){
        let res = '';

        if (computerMove === userMove) {
            res = 'Tie';
        }
        else if (userMove === 'rock') {
            res = (computerMove === 'scissors') ? 'You Won' : 'You Lost';
        }
        else if (userMove === 'paper') {
            res = (computerMove === 'rock') ? 'You Won' : 'You Lost';
        }
        else if (userMove === 'scissors') {
            res = (computerMove === 'paper') ? 'You Won' : 'You Lost';
        }

        
        return res;
    }
    
    function playGame(userMove){

        let computerMove = getComputerMove();
        
        let res = getResult(computerMove, userMove);

        
        
        if(res == 'You Won'){
            score.win++;
        }
        else if(res == 'You Lost'){
            score.lost++;
        }
        else if(res === 'Tie'){
            score.draw++;
        }

        
        localStorage.setItem('score',JSON.stringify(score));
         
        // console.log(resText);
        resText.innerHTML = `${res}`;
        choicesText.innerHTML = `Your choice ${userMove}. <br/><br/>
        Computer choice ${computerMove}`;

        scoreRes.innerHTML = `Wins : ${score.win} Lost : ${score.lost} Tie : ${score.draw}`


        // alert(`You picked ${userMove}. Computer picked ${computerMove}. ${res}.

        // Total scores are Wins : ${score.win} Lost : ${score.lost} Tie : ${score.draw} `);

    }

    function resetScore(){
        // score.win = 0;
        // score.lost = 0;
        // score.draw = 0;
        score = {
            win : 0,
            lost : 0,
            draw : 0
        };

        resText.innerHTML = ``;
        choicesText.innerHTML = ``;
        scoreRes.innerHTML = `Wins : ${0} Lost : ${0} Tie : ${0}`;
        localStorage.removeItem('score');
        
    }
    
</script>
</html>
