<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Shipping Calci</title>
</head>
<body>
    
    <p>Amazon Shipping Calculator</p>
    <p>Orders under $40 = +10 Shipping</p>
    <p>Orders over $40 = Free Shipping</p>

    <input class="input-text" type="number" placeholder="Cost of Order ">
    <input class="btn" type="button"  value="Calculate">
    <p class="typing" ></p>
    <p class="display" ></p>

</body>
<script>
     let btn = document.querySelector('.btn');
       let inputText = document.querySelector('.input-text')
    function calculate(){
     

        let display = document.querySelector('.display');

        let sum = 10;
        let valueNum = (Number)(inputText.value);
        if(valueNum < 40){
            sum += valueNum;
            // console.log(sum);
            display.innerHTML = `$${sum}`;
        }
        else{
            display.innerHTML = `$${valueNum}`;
        }

        inputText.value = '';
    }

    
    btn.addEventListener('click',()=>{
        // console.log(inputText.value);
        calculate();
    });

    inputText.addEventListener('keydown',(e)=>{
         
        if(e.key === 'Enter'){
            calculate();
        }
    })

     
</script>
</html>
