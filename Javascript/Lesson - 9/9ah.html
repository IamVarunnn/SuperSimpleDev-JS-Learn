<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <input class="input-text" type="text" placeholder="Enter your text">
    <p class="type-text" ></p>

</body>
<script>

    let inputText = document.querySelector('.input-text');

    inputText.addEventListener('keyup',(e)=>{
        // console.log(e.key);    
        document.querySelector('.type-text').innerHTML = inputText.value;
    });

</script>
</html>
