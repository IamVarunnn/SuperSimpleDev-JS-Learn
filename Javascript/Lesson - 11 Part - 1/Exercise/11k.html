<script>

    function countPos(arr){
        let n = arr.length;
        let count = 0;

        for(let i = 0; i < n; i++){

            if(arr[i] > 0){
                count++;
            }
        }

        return count;
    }

    console.log(countPos([1, 2, -1, -1, -4, 7]));

</script>
